openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Dryko CRM API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: contacts
    description: Contact management
  - name: conversations
    description: Conversation history
  - name: inbox
    description: Inbox conversation management
  - name: respostas-rapidas
    description: Quick reply management
  - name: pipeline
    description: Sales pipeline management
  - name: tarefas
    description: Task management
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /contacts:
    get:
      operationId: listContacts
      tags: [contacts]
      summary: List contacts
      parameters:
        - name: search
          in: query
          schema: { type: string }
        - name: tag
          in: query
          schema: { type: string }
        - name: canal
          in: query
          schema:
            type: string
            enum: [whatsapp, email, instagram, telefone]
      responses:
        "200":
          description: List of contacts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Contact"
    post:
      operationId: createContact
      tags: [contacts]
      summary: Create a contact
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contact"
        "409":
          description: Duplicate phone or email
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /contacts/stats:
    get:
      operationId: getContactStats
      tags: [contacts]
      summary: Get contact statistics
      responses:
        "200":
          description: Contact statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactStats"

  /contacts/tags:
    get:
      operationId: listTags
      tags: [contacts]
      summary: List all unique tags
      responses:
        "200":
          description: List of tags
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string

  /contacts/import:
    post:
      operationId: importContacts
      tags: [contacts]
      summary: Import contacts from CSV
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImportInput"
      responses:
        "200":
          description: Import result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportResult"

  /contacts/{id}:
    get:
      operationId: getContact
      tags: [contacts]
      summary: Get a contact by ID
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Contact
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contact"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateContact
      tags: [contacts]
      summary: Update a contact
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactUpdate"
      responses:
        "200":
          description: Updated contact
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contact"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Duplicate phone or email
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteContact
      tags: [contacts]
      summary: Delete a contact
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /contacts/{id}/conversations:
    get:
      operationId: listConversations
      tags: [conversations]
      summary: List conversation history for a contact
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Conversation"
    post:
      operationId: createConversation
      tags: [conversations]
      summary: Add a conversation entry for a contact
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConversationInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Conversation"
        "404":
          description: Contact not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /conversations/{id}:
    delete:
      operationId: deleteConversation
      tags: [conversations]
      summary: Delete a conversation entry
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /inbox:
    get:
      operationId: listInbox
      tags: [inbox]
      summary: List all inbox conversations
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [aberta, em_andamento, resolvida]
        - name: canal
          in: query
          schema:
            type: string
            enum: [whatsapp, email, instagram, telefone]
      responses:
        "200":
          description: List of inbox conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InboxConversation"
    post:
      operationId: createInboxConversation
      tags: [inbox]
      summary: Create a new inbox conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InboxConversationInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InboxConversation"
        "404":
          description: Contact not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /inbox/stats:
    get:
      operationId: getInboxStats
      tags: [inbox]
      summary: Get inbox statistics
      responses:
        "200":
          description: Inbox statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InboxStats"

  /inbox/{id}:
    get:
      operationId: getInboxConversation
      tags: [inbox]
      summary: Get a single inbox conversation
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Inbox conversation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InboxConversation"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateInboxConversation
      tags: [inbox]
      summary: Update inbox conversation status or classification
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InboxConversationUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InboxConversation"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /inbox/{id}/mensagens:
    get:
      operationId: listMensagens
      tags: [inbox]
      summary: List messages in an inbox conversation
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Mensagem"
    post:
      operationId: sendMensagem
      tags: [inbox]
      summary: Send a message in an inbox conversation
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MensagemInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Mensagem"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /respostas-rapidas:
    get:
      operationId: listRespostasRapidas
      tags: [respostas-rapidas]
      summary: List all quick replies
      responses:
        "200":
          description: Quick replies
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RespostaRapida"
    post:
      operationId: createRespostaRapida
      tags: [respostas-rapidas]
      summary: Create a quick reply
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RespostaRapidaInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RespostaRapida"

  /respostas-rapidas/{id}:
    delete:
      operationId: deleteRespostaRapida
      tags: [respostas-rapidas]
      summary: Delete a quick reply
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /tarefas/stats:
    get:
      operationId: getTarefasStats
      tags: [tarefas]
      summary: Get task stats (pending today count)
      responses:
        "200":
          description: Task statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TarefaStats"

  /tarefas:
    get:
      operationId: listTarefas
      tags: [tarefas]
      summary: List all tasks
      parameters:
        - name: status
          in: query
          schema: { type: string, enum: [pendente, concluida] }
        - name: prioridade
          in: query
          schema: { type: string, enum: [alta, media, baixa] }
      responses:
        "200":
          description: List of tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Tarefa"
    post:
      operationId: createTarefa
      tags: [tarefas]
      summary: Create a new task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TarefaInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tarefa"

  /tarefas/{id}:
    get:
      operationId: getTarefa
      tags: [tarefas]
      summary: Get a task by ID
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tarefa"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateTarefa
      tags: [tarefas]
      summary: Update a task
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TarefaUpdate"
      responses:
        "200":
          description: Updated task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tarefa"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteTarefa
      tags: [tarefas]
      summary: Delete a task
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /pipeline/stats:
    get:
      operationId: getPipelineStats
      tags: [pipeline]
      summary: Get pipeline statistics per stage
      responses:
        "200":
          description: Pipeline statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PipelineStats"

  /pipeline/etapas:
    get:
      operationId: listEtapas
      tags: [pipeline]
      summary: List all pipeline stages
      responses:
        "200":
          description: List of stages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EtapaPipeline"
    post:
      operationId: createEtapa
      tags: [pipeline]
      summary: Create a new stage
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EtapaInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EtapaPipeline"

  /pipeline/etapas/{id}:
    put:
      operationId: updateEtapa
      tags: [pipeline]
      summary: Update a stage
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EtapaInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EtapaPipeline"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteEtapa
      tags: [pipeline]
      summary: Delete a stage (only if empty)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Stage has deals
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /pipeline/negocios:
    get:
      operationId: listNegocios
      tags: [pipeline]
      summary: List all deals
      responses:
        "200":
          description: List of deals
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Negocio"
    post:
      operationId: createNegocio
      tags: [pipeline]
      summary: Create a new deal
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NegocioInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Negocio"

  /pipeline/negocios/{id}:
    get:
      operationId: getNegocio
      tags: [pipeline]
      summary: Get a deal by ID
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Deal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Negocio"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateNegocio
      tags: [pipeline]
      summary: Update a deal
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NegocioUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Negocio"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteNegocio
      tags: [pipeline]
      summary: Delete a deal
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /pipeline/negocios/{id}/historico:
    get:
      operationId: getHistoricoNegocio
      tags: [pipeline]
      summary: Get movement history for a deal
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Movement history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/HistoricoMovimentacao"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    Contact:
      type: object
      required: [id, nome, telefone, canal, tags, notas, criadoEm, atualizadoEm]
      properties:
        id:
          type: integer
        nome:
          type: string
        telefone:
          type: string
        email:
          type: ["string", "null"]
        canal:
          type: string
          enum: [whatsapp, email, instagram, telefone]
        tags:
          type: array
          items:
            type: string
        notas:
          type: ["string", "null"]
        criadoEm:
          type: string
          format: date-time
        atualizadoEm:
          type: string
          format: date-time

    ContactInput:
      type: object
      required: [nome, telefone, canal]
      properties:
        nome:
          type: string
          minLength: 1
        telefone:
          type: string
          minLength: 1
        email:
          type: ["string", "null"]
        canal:
          type: string
          enum: [whatsapp, email, instagram, telefone]
        tags:
          type: array
          items:
            type: string
          default: []
        notas:
          type: ["string", "null"]

    ContactUpdate:
      type: object
      properties:
        nome:
          type: string
          minLength: 1
        telefone:
          type: string
          minLength: 1
        email:
          type: ["string", "null"]
        canal:
          type: string
          enum: [whatsapp, email, instagram, telefone]
        tags:
          type: array
          items:
            type: string
        notas:
          type: ["string", "null"]

    ContactStats:
      type: object
      required: [total, porCanal]
      properties:
        total:
          type: integer
        porCanal:
          type: array
          items:
            $ref: "#/components/schemas/CanalCount"

    CanalCount:
      type: object
      required: [canal, total]
      properties:
        canal:
          type: string
        total:
          type: integer

    Conversation:
      type: object
      required: [id, contatoId, conteudo, canal, direcao, criadoEm]
      properties:
        id:
          type: integer
        contatoId:
          type: integer
        conteudo:
          type: string
        canal:
          type: string
          enum: [whatsapp, email, instagram, telefone]
        direcao:
          type: string
          enum: [entrada, saida]
        criadoEm:
          type: string
          format: date-time

    ConversationInput:
      type: object
      required: [conteudo, canal, direcao]
      properties:
        conteudo:
          type: string
          minLength: 1
        canal:
          type: string
          enum: [whatsapp, email, instagram, telefone]
        direcao:
          type: string
          enum: [entrada, saida]

    ImportInput:
      type: object
      required: [registros]
      properties:
        registros:
          type: array
          items:
            $ref: "#/components/schemas/ContactInput"

    ImportResult:
      type: object
      required: [importados, erros]
      properties:
        importados:
          type: integer
        erros:
          type: array
          items:
            type: string

    Negocio:
      type: object
      required: [id, nome, valor, etapaId, etapaNome, etapaCor, status, criadoEm]
      properties:
        id:
          type: integer
        nome:
          type: string
        valor:
          type: number
          format: double
        contatoId:
          type: ["integer", "null"]
        contatoNome:
          type: ["string", "null"]
        responsavel:
          type: ["string", "null"]
        prazo:
          type: ["string", "null"]
        etapaId:
          type: integer
        etapaNome:
          type: string
        etapaCor:
          type: string
        status:
          type: string
          enum: [ativo, ganho, perdido]
        criadoEm:
          type: string
          format: date-time

    NegocioInput:
      type: object
      required: [nome, etapaId]
      properties:
        nome:
          type: string
          minLength: 1
        valor:
          type: number
          default: 0
        contatoId:
          type: ["integer", "null"]
        responsavel:
          type: ["string", "null"]
        prazo:
          type: ["string", "null"]
        etapaId:
          type: integer

    NegocioUpdate:
      type: object
      properties:
        nome:
          type: string
          minLength: 1
        valor:
          type: number
        contatoId:
          type: ["integer", "null"]
        responsavel:
          type: ["string", "null"]
        prazo:
          type: ["string", "null"]
        etapaId:
          type: integer
        status:
          type: string
          enum: [ativo, ganho, perdido]

    EtapaPipeline:
      type: object
      required: [id, nome, ordem, cor, totalNegocios, totalValor]
      properties:
        id:
          type: integer
        nome:
          type: string
        ordem:
          type: integer
        cor:
          type: string
        totalNegocios:
          type: integer
        totalValor:
          type: number
          format: double

    EtapaInput:
      type: object
      required: [nome]
      properties:
        nome:
          type: string
          minLength: 1
        ordem:
          type: integer
        cor:
          type: string

    PipelineStats:
      type: object
      required: [etapas]
      properties:
        etapas:
          type: array
          items:
            $ref: "#/components/schemas/EtapaPipeline"

    Tarefa:
      type: object
      required: [id, titulo, dataHora, prioridade, status, criadoEm]
      properties:
        id:
          type: integer
