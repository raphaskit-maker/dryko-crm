kind = "web"
previewPath = "/"
title = "Dryko CRM"
version = "1.0.0"
id = "artifacts/dryko-crm"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25717

[services.development]
run = "pnpm --filter @workspace/dryko-crm run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/dryko-crm", "run", "build" ]
publicDir = "artifacts/dryko-crm/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25717"
BASE_PATH = "/"
