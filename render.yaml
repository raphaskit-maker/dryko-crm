services:
  - type: web
    name: dryko-crm-frontend
    env: static
    rootDir: artifacts/dryko-crm
    buildCommand: "npm install -g pnpm@10 && pnpm install --no-frozen-lockfile && pnpm run build"
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
